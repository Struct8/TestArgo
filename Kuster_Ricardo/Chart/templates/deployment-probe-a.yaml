apiVersion: apps/v1
kind: Deployment
metadata:
  name: probe-a
  labels:
    app.kubernetes.io/name: probe-a
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: Chart
    cloudman.io/user: rmay-struct
  namespace: probe-lab
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  template:
    spec:
      automountServiceAccountToken: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      restartPolicy: Always
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      serviceAccountName: deployment-probe-a-v1-sa
      containers:
        - image: "struct8-probe:dev"
          imagePullPolicy: IfNotPresent
          name: probe
          stdin: false
          stdinOnce: false
          tty: false
          env:
            - name: PROBE_NODE_ID
              value: "probe-a"
            - name: PROBE_LOG_LEVEL
              value: "info"
            - name: FORBIDDEN_PROBE_C_HOST
              value: "probe-c-svc"
            - name: FORBIDDEN_PROBE_C_PORT
              value: "8080"
            - name: PROBE_AUTOFIRE_SECONDS
              value: "30"
            - name: PROBE_AUTOFIRE_DELAY_SECONDS
              value: "20"
            - name: PROBE_B_HOST
              value: "probe-b-svc"
            - name: PROBE_B_PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          ports:
            - containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
    metadata:
      labels:
        app.kubernetes.io/name: probe-a
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: probe-a
