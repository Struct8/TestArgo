---
# File: templates/gatewayclass-kong-class.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: kong-class
  annotations:
    konghq.com/gatewayclass-unmanaged: "true"
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: kong-class
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
spec:
  controllerName: konghq.com/kic-gateway-controller

---
# File: templates/gateway-gapi.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gapi
  labels:
    app.kubernetes.io/name: gapi
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
  namespace: infrab
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  gatewayClassName: kong-class
  listeners:
    - name: gapi3
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
        kinds:
          - group: gateway.networking.k8s.io
            kind: HTTPRoute

---
# File: templates/httproute-route-kong.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-kong
  namespace: infrab
  labels:
    app.kubernetes.io/name: route-kong
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - name: gapi
      namespace: infrab
      sectionName: gapi3
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kong-manager
          namespace: infrab
          port: 8002
  hostnames:
    - kong.k8s.cloudman.pro

---
# File: templates/httproute-route2.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route2
  namespace: infrab
  labels:
    app.kubernetes.io/name: route2
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - name: gapi
      namespace: infrab
      sectionName: gapi3
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argo1-argocd-server
          namespace: argocd1
          port: 80
  hostnames:
    - argo.k8s.cloudman.pro

---
# File: application-kong.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong
  namespace: argocd1
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    targetRevision: 2.44.0
    helm:
      valuesObject:
        manager:
          enabled: true
          type: ClusterIP
        ingressController:
          enabled: true
          installCRDs: false
          gatewayAPIControllerName: konghq.com/kic-gateway-controller
          rbac:
            gatewayAPI:
              enabled: true
          gatewayFeatureGates: "Gateway=true"
        proxy:
          type: ClusterIP
        env:
          database: "off"
          router_flavor: expressions
        fullnameOverride: kong
    repoURL: "https://charts.konghq.com"
    chart: kong
  destination:
    server: "https://kubernetes.default.svc"
    namespace: infrab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# File: templates/referencegrant-grant-infrab-to-argocd1.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: ReferenceGrant
metadata:
  name: grant-infrab-to-argocd1
  namespace: argocd1
  labels:
    app.kubernetes.io/name: grant-infrab-to-argocd1
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: infrab
  to:
    - group: ""
      kind: Service
---
# 1. Deployment do Jogo 2048
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-2048
  namespace: infrab
  labels:
    app.kubernetes.io/name: game-2048
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: game-2048
  template:
    metadata:
      labels:
        app: game-2048
    spec:
      containers:
        - name: game-2048
          image: alexwhen/docker-2048 # Imagem popular do 2048 no Docker Hub
          ports:
            - containerPort: 80

---
# 2. Service para o Jogo 2048
apiVersion: v1
kind: Service
metadata:
  name: game-2048-svc
  namespace: infrab
  labels:
    app.kubernetes.io/name: game-2048
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: game-2048

---
# 3. Rota (HTTPRoute) vinculada ao seu Gateway 'gapi'
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-game2048
  namespace: infrab
  labels:
    app.kubernetes.io/name: route-game2048
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - name: gapi
      namespace: infrab
      sectionName: gapi3
  hostnames:
    - game2048.k8s.cloudman.pro
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: game-2048-svc
          port: 80
