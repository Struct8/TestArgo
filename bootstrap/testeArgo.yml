# File: namespace-infrab.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: infrab
  labels:
    app.kubernetes.io/name: infrab
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "-20"

---
# File: templates/gateway-gapi.yaml
apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: GAPI
  labels:
    app.kubernetes.io/name: GAPI
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
  namespace: infrab
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  gatewayClassName: kong
  listeners:
    - name: GAPI3
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
        kinds:
          - group: gateway.networking.k8s.io
            kind: HTTPRoute

---
# File: templates/httproute-route2.yaml
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: route2
  namespace: infrab
  labels:
    app.kubernetes.io/name: route2
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - name: GAPI
      namespace: infrab
      sectionName: GAPI3
      port: 80
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argo1-argocd-server
          namespace: argocd1
          port: 80
  hostnames:
    - argo.k8s.cloudman.pro

---
# File: application-kong1.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong1
  namespace: argocd1
  labels:
    app.kubernetes.io/name: Kong1
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  destination:
    namespace: infrab
    server: "https://kubernetes.default.svc"
  project: default
  source:
    targetRevision: 2.44.0
    helm:
      valuesObject:
        ingressController:
          enabled: true
          installCRDs: false
          gatewayFeatureGates: "Gateway=true"
        proxy:
          type: LoadBalancer
          annotations:
            # Força o AWS Load Balancer Controller a gerenciar este Service
            service.beta.kubernetes.io/aws-load-balancer-type: "external"
            service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
            service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
            service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
            # O certificado pode ficar hardcoded se for um ACM persistente criado fora do Terraform, 
            # mas se foi criado pelo TF, você precisará injetar o ARN dinamicamente ou usar auto-discovery de cert.
            service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:952133486861:certificate/56661e02-bfe7-4a8e-b1a7-d28802ab04ac"
            service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
            service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: "Name=ALBeks,managed-by=struct8,State=State8,user=Ricardo"
            external-dns.alpha.kubernetes.io/hostname: "argo.k8s.cloudman.pro"
          http:
            servicePort: 80
            containerPort: 8000
          tls:
            servicePort: 443 # Porta externa do Service/NLB
            containerPort: 8000 # PORTA INTERNA DO KONG (Mudamos de 8443 para 8000)
            overrideServiceTargetPort: 8000
        env:
          database: "off"
          router_flavor: expressions
    repoURL: "https://charts.konghq.com"
    chart: kong
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false


---
# File: templates/referencegrant-grant-infrab-to-argocd1.yaml
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: grant-infrab-to-argocd1
  namespace: argocd1
  labels:
    app.kubernetes.io/name: grant-infrab-to-argocd1
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: infrab
  to:
    - group: ""
      kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: kong # Deve bater exatamente com o 'gatewayClassName' do seu Gateway
spec:
  controllerName: konghq.com/ingress-controller
