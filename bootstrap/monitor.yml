---
# File: templates/httproute-monitoring-graf.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: monitoring-graf
  namespace: monitoringtest
  labels:
    app.kubernetes.io/name: monitoring-graf
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State10
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - name: gapi
      namespace: infrab
      sectionName: g-api3
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: graf-service  # Atualizado para o serviço correto do Grafana
          namespace: monitoringtest
          port: 3000          # Porta padrão do serviço do Grafana (ou a porta exposta pelo serviço)
  hostnames:
    - grafana.k8s.cloudman.pro


---
# File: templates/httproute-monitoring-prom.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: monitoring-prom
  namespace: monitoringtest
  labels:
    app.kubernetes.io/name: monitoring-prom
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State10
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - name: gapi
      namespace: infrab
      sectionName: g-api3
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: prom-exposed-svc  # Nome do novo serviço ClusterIP
          namespace: monitoringtest
          port: 9090
  hostnames:
    - prometheus.k8s.cloudman.pro

---
apiVersion: v1
kind: Service
metadata:
  name: prom-exposed-svc
  namespace: monitoringtest
spec:
  type: ClusterIP
  ports:
    - name: web
      port: 9090
      targetPort: 9090
  selector:
    # Este seletor aponta para os pods criados pelo seu recurso do Prometheus "prom"
    prometheus: prom

---
# File: templates/prometheus-prom.yaml
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: prom
  labels:
    app.kubernetes.io/name: prom
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State10
    cloudman.io/user: Ricardo
  namespace: monitoringtest
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 1000m
  serviceAccountName: prometheus-prom-sa
  serviceMonitorSelector: {}
  serviceMonitorNamespaceSelector: {}

---
# File: templates/grafana-graf.yaml
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: graf
  namespace: monitoringtest
  labels:
    app.kubernetes.io/name: graf
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State10
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  config:
    log:
      mode: console
    auth.anonymous:
      enabled: "true"
      org_role: Admin
  deployment:
    spec:
      template:
        spec:
          serviceAccountName: grafana-graf-sa
          containers:
            - name: grafana
              resources:
                requests:
                  memory: 100Mi
                  cpu: 100m
                limits:
                  memory: 256Mi
                  cpu: 200m
