
# --- INFRAESTRUTURA DE PERMISSÕES (RBAC) ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prom-sa
  namespace: monitoringtest
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prom-cluster-role
rules:
- apiGroups: [""]
  resources: ["nodes", "nodes/metrics", "services", "endpoints", "pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prom-cluster-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prom-cluster-role
subjects:
- kind: ServiceAccount
  name: prom-sa
  namespace: monitoringtest

---
# --- INSTÂNCIA DO PROMETHEUS (Operado pelo Prometheus Operator) ---
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: prom-instance
  namespace: monitoringtest
spec:
  serviceAccountName: prom-sa
  replicas: 1
  resources:
    requests:
      memory: 1Gi
  serviceMonitorSelector:
    matchLabels:
      monitor: "true" # O gerador deve colocar essa label nos ServiceMonitors

---
# SERVICE PARA O PROMETHEUS
apiVersion: v1
kind: Service
metadata:
  name: svc-prometheus
  namespace: monitoringtest
spec:
  ports:
  - name: web
    port: 9090
  selector:
    prometheus: prom-instance

---
# --- INSTÂNCIA DO GRAFANA (Operado pelo Grafana Operator) ---
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana-instance
  namespace: monitoringtest
  labels:
    instance: "primary" # Esta label é usada pelo Datasource para achar o Grafana
spec:
  # ADICIONE ESTE BLOCO:
  instanceSelector:
    matchLabels:
      instance: "primary" 
  config:
    log:
      mode: "console"
    auth.anonymous:
      enabled: true
      org_role: "Admin"

---
# CONEXÃO AUTOMÁTICA (Datasource)
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: ds-prometheus
  namespace: monitoringtest
spec:
  instanceSelector:
    matchLabels:
      instance: "primary"
  datasource:
    name: Prometheus
    type: prometheus
    url: http://svc-prometheus.monitoringtest.svc.cluster.local:9090
    access: proxy
    isDefault: true

---
# --- ROTEAMENTO (Gateway API) ---

# ROTA 1: PROMETHEUS
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-prometheus
  namespace: monitoringtest
spec:
  parentRefs:
    - name: gapi
      namespace: infrab
      sectionName: g-api3
  hostnames:
    - prometheus.k8s.cloudman.pro
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: svc-prometheus
          port: 9090

---
# ROTA 2: GRAFANA
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-grafana
  namespace: monitoringtest
spec:
  parentRefs:
    - name: gapi
      namespace: infrab
      sectionName: g-api3
  hostnames:
    - grafana.k8s.cloudman.pro
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: grafana-instance-service
          port: 3000
          kind: Service  # Adicione explicitamente
          group: ""      # Adicione explicitamente
          weight: 1      # Adicione explicitamente
