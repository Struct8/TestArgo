---
# File: templates/prometheus-prom.yaml
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: prom
  labels:
    app.kubernetes.io/name: prom
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State10
    cloudman.io/user: Ricardo
  namespace: monitoringtest
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 1000m
  serviceAccountName: prometheus-prom-sa
  serviceMonitorSelector: {}
  serviceMonitorNamespaceSelector: {}

---
# File: templates/grafana-graf.yaml
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: graf
  namespace: monitoringtest
  labels:
    app.kubernetes.io/name: graf
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State10
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              resources:
                requests:
                  memory: 100Mi
                  cpu: 100m
                limits:
                  memory: 256Mi
                  cpu: 200m
          serviceAccountName: grafana-graf-sa
      replicas: 1
  version: 13.0.1
  config:
    log:
      mode: console
    auth.anonymous:
      enabled: "true"
      org_role: Admin

---
# File: templates/servicemonitor-kong-metrics-monitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kong-metrics-monitor
  labels:
    release: prom
    app.kubernetes.io/name: kong-metrics-monitor
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State10
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  namespaceSelector:
    matchNames:
      - infrab
  selector:
    matchLabels:
      app.kubernetes.io/name: kong-metrics-svc
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
