# File: templates/httproute-monitoring-graf.yaml
# File: templates/httproute-monitoring-graf.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: monitoring-graf
  namespace: monitoringtest
  labels:
    app.kubernetes.io/name: monitoring-graf
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State10
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - name: gapi # <--- Lembre de usar minúsculo "gapi" aqui também!
      namespace: infrab
      sectionName: g-api3
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: graf-service # <--- Apontar para o serviço gerado pelo operador
          namespace: monitoringtest
          port: 3000         # <--- Porta oficial do serviço do operador (geralmente 3000)
  hostnames:
    - grafana.k8s.cloudman.pro
---
# File: templates/httproute-monitoring-prom.yaml
