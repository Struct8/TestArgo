---
# File: templates/httproute-prometheus.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-prometheus
  namespace: monitoringtest
  labels:
    app.kubernetes.io/name: route-prometheus
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State10
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - name: gapi
      namespace: infrab
      sectionName: gapi3
  hostnames:
    - prometheus.k8s.cloudman.pro
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # Quando instalado via Helm com o nome "prometheus1", 
        # o serviço padrão criado é "prometheus1-server" na porta 80.
        - name: prometheus1-server
          namespace: monitoringtest
          port: 80

---
# File: templates/httproute-grafana.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-grafana
  namespace: monitoringtest
  labels:
    app.kubernetes.io/name: route-grafana
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State10
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - name: gapi
      namespace: infrab
      sectionName: gapi3
  hostnames:
    - grafana.k8s.cloudman.pro
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # Quando instalado via Helm com o nome "graph1", 
        # o serviço padrão criado é "graph1-grafana" na porta 80.
        - name: graph1-grafana
          namespace: monitoringtest
          port: 80

---
# File: application-prometheus1.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus1
  namespace: argocd1
  labels:
    app.kubernetes.io/name: prometheus1
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State10
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    # Usando o repositório Helm oficial do Prometheus
    repoURL: "https://prometheus-community.github.io/helm-charts"
    chart: prometheus
    targetRevision: "25.11.0" # Versão do Chart
    helm:
      # Desabilitando componentes extras para manter leve (opcional)
      valuesObject:
        alertmanager:
          enabled: false
        pushgateway:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoringtest
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# File: application-graph1.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: graph1
  namespace: argocd1
  labels:
    app.kubernetes.io/name: graph1
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State10
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    # Usando o repositório Helm oficial do Grafana
    repoURL: "https://grafana.github.io/helm-charts"
    chart: grafana
    targetRevision: "7.3.7" # Versão do Chart
    helm:
      valuesObject:
        adminPassword: "admin" # Senha padrão (troque em produção)
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoringtest
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
