# File: templates/clusterrole-prom-cluster-role.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prom-cluster-role
  labels:
    app.kubernetes.io/name: prom-cluster-role
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State10
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
