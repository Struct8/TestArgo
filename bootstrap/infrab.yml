---
# File: templates/service-game-2048-svc.yaml
apiVersion: v1
kind: Service
metadata:
  name: game-2048-svc
  namespace: infrab
  labels:
    app.kubernetes.io/name: game-2048-svc
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    app.kubernetes.io/name: game-2048
  ports:
    - name: http-80
      port: 80
      targetPort: 80
      protocol: TCP

---
# File: templates/deployment-game-2048.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-2048
  labels:
    app.kubernetes.io/name: game-2048
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
  namespace: infrab
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  template:
    spec:
      restartPolicy: Always
      dnsPolicy: ClusterFirst
      terminationGracePeriodSeconds: 30
      containers:
        - image: "public.ecr.aws/l6m2t8p7/docker-2048:latest"
          imagePullPolicy: Always
          name: game-2048
          stdin: false
          stdinOnce: false
          tty: false
          ports:
            - containerPort: 80
              name: http-80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 128Mi
    metadata:
      labels:
        app.kubernetes.io/name: game-2048
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: game-2048

