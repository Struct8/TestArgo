---
# File: application-kong.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong
  namespace: argocd1
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State8
    cloudman.io/user: Ricardo
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    targetRevision: 2.44.0
    helm:
      valuesObject:
        manager:
          enabled: true
          type: ClusterIP
        ingressController:
          enabled: true
          installCRDs: false
          gatewayAPIControllerName: konghq.com/kic-gateway-controller
          rbac:
            gatewayAPI:
              enabled: true
          gatewayFeatureGates: "Gateway=true"
        proxy:
          type: ClusterIP
          annotations:
            konghq.com/gateway-name: "gapi"
            konghq.com/gateway-namespace: "infrab"
        env:
          database: "off"
          router_flavor: expressions
        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8100"
          prometheus.io/path: "/metrics"
        serviceMonitor:
          interval: 30s
          scrapeTimeout: 10s
          enabled: true
          labels:
            monitor: "true"
        status:
          enabled: true
          http:
            enabled: true
        fullnameOverride: kong
    repoURL: "https://charts.konghq.com"
    chart: kong
  destination:
    server: "https://kubernetes.default.svc"
    namespace: infrab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

