---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: kong-metrics
  # ALTERADO: Enviamos o monitor para o namespace onde o Prometheus está instalado
  namespace: kube-prometheus-stack-system 
  labels:
    release: kube-prometheus-stack
spec:
  # ALTERADO: Instruímos o Prometheus a buscar os Pods lá no namespace "infrab"
  namespaceSelector:
    matchNames:
      - infrab 
  selector:
    matchLabels:
      app.kubernetes.io/name: kong
  podMetricsEndpoints:
  - port: metrics
    path: /metrics
    interval: 15s
---
apiVersion: gateway-operator.konghq.com/v1beta1
kind: GatewayConfiguration
metadata:
  name: prod-config
  namespace: infrab
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  dataPlaneOptions:
    deployment:
      replicas: 1
      podTemplateSpec:
        metadata:
          labels:
            app.kubernetes.io/name: kong
        spec:
          containers:
            - name: proxy
              env:
                - name: KONG_ADMIN_GUI_LISTEN
                  value: "0.0.0.0:8002"
                - name: KONG_ADMIN_GUI_URL
                  value: "http://kong.k8s.cloudman.pro"
                - name: KONG_ADMIN_GUI_API_URL
                  value: "http://kong-admin.k8s.cloudman.pro"
                - name: KONG_ADMIN_LISTEN
                  value: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
                - name: KONG_STATUS_LISTEN
                  value: "0.0.0.0:8100"
              ports:
                - containerPort: 8100
                  name: metrics
                  protocol: TCP
    network:
      services:
        ingress:
          type: ClusterIP
          name: "kong-proxy-static"

---
