apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: Syncope
    cloudman.io/user: rmay-struct
  namespace: syncope
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      serviceAccountName: deployment-postgres-v1-sa
      volumes:
        - name: postgres-data
      containers:
        - image: "postgres:16"
          imagePullPolicy: IfNotPresent
          name: postgres
          stdin: false
          stdinOnce: false
          tty: false
          env:
            - name: POSTGRES_DB
              value: "syncope"
            - name: POSTGRES_USER
              value: "syncope"
          ports:
            - containerPort: 5432
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          envFrom:
            - secretRef:
                name: syncope-db-secret
    metadata:
      labels:
        app.kubernetes.io/name: postgres
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
