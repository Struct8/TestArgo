apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-syncope-core-to-postgres-5432
  namespace: syncope
  labels:
    app.kubernetes.io/name: allow-syncope-core-to-postgres-5432
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: Syncope
    cloudman.io/user: rmay-struct
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: syncope-core
      ports:
        - protocol: TCP
          port: 5432
