apiVersion: v1
kind: Service
metadata:
  name: syncope-console-svc
  namespace: syncope
  labels:
    app.kubernetes.io/name: syncope-console-svc
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: Syncope
    cloudman.io/user: rmay-struct
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  type: ClusterIP
  ports:
    - name: http-80
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: port-8080
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: syncope-console
