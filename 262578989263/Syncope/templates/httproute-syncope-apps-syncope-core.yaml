apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: syncope-apps-syncope-core
  namespace: syncope
  labels:
    app.kubernetes.io/name: syncope-apps-syncope-core
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: Syncope
    cloudman.io/user: rmay-struct
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - name: gapi
      namespace: infra
      sectionName: g-api3
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /syncope
      backendRefs:
        - name: syncope-core-svc
          namespace: syncope
          port: 80
    - matches:
        - path:
            type: Exact
            value: /
      backendRefs:
        - name: syncope-core-svc
          namespace: syncope
          port: 80
      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 302
            path:
              type: ReplaceFullPath
              replaceFullPath: /syncope/
  hostnames:
    - syncope.k8s.admin.billingpay.com.br
