apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncope-enduser
  labels:
    app.kubernetes.io/name: syncope-enduser
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: Syncope
    cloudman.io/user: rmay-struct
  namespace: syncope
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      serviceAccountName: deployment-syncope-enduser-v1-sa
      containers:
        - image: "apache/syncope-enduser:4.1.1"
          imagePullPolicy: IfNotPresent
          name: syncope-enduser
          stdin: false
          stdinOnce: false
          tty: false
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: KEYMASTER_ADDRESS
              value: "http://syncope-core-svc:8080/syncope/rest/keymaster"
            - name: SERVICE_DISCOVERY_ADDRESS
              value: "http://syncope-enduser-svc:8080/syncope-enduser/"
            - name: SYNCOPE_CORE_HOST
              value: "syncope-core-svc"
            - name: SYNCOPE_CORE_PORT
              value: "8080"
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          envFrom:
            - secretRef:
                name: syncope-anonymous-secret
    metadata:
      labels:
        app.kubernetes.io/name: syncope-enduser
  selector:
    matchLabels:
      app.kubernetes.io/name: syncope-enduser
