apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: games-supermario
  namespace: gamestest
  labels:
    app.kubernetes.io/name: games-supermario
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: Games
    cloudman.io/user: rmay-struct
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - name: gapi
      namespace: infra
      sectionName: g-api3
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: supermario-svc
          namespace: gamestest
          port: 80
  hostnames:
    - mario.k8s.admin.billingpay.com.br
