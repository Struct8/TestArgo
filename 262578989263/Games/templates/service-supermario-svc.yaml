apiVersion: v1
kind: Service
metadata:
  name: supermario-svc
  namespace: gamestest
  labels:
    app.kubernetes.io/name: supermario-svc
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: Games
    cloudman.io/user: rmay-struct
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  type: ClusterIP
  ports:
    - name: http-80
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: port-8080
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: supermario
