apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: syncope-apps-syncope-console
  namespace: syncope
  labels:
    app.kubernetes.io/name: syncope-apps-syncope-console
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: State12
    cloudman.io/user: rmay-struct
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - name: gapi
      namespace: infrab
      sectionName: g-api3
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: syncope-console-8080-svc
          namespace: syncope
          port: 80
  hostnames:
    - syncope-admin.k8s.admin.billingpay.com.br
