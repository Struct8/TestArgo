apiVersion: configuration.konghq.com/v1
kind: KongClusterPlugin
metadata:
  name: rate-limiting-stack3
  annotations:
    kubernetes.io/ingress.class: "kong"
    argocd.argoproj.io/sync-wave: "-5"
  labels:
    app.kubernetes.io/name: rate-limiting-stack3
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: Chart
    cloudman.io/user: rmay-struct
plugin: rate_limiting
config:
  second: 200
  minute: 0
  hour: 0
  day: 0
  month: 0
  year: 0
  limit_by: ip
  policy: local
  fault_tolerant: false
  hide_client_headers: false
  error_code: 0
  sync_rate: 120
