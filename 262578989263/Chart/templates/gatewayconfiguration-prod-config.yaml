apiVersion: gateway-operator.konghq.com/v1beta1
kind: GatewayConfiguration
metadata:
  name: prod-config
  namespace: infrab
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/managed-by: struct8
    app.kubernetes.io/instance: Chart
    cloudman.io/user: rmay-struct
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  dataPlaneOptions:
    deployment:
      replicas: 1
      podTemplateSpec:
        spec:
          containers:
            - resources:
                requests:
                  cpu: "250m"
                  memory: "256Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
              ports:
                - name: metrics
                  containerPort: 8100
                  protocol: TCP
              env:
                - name: KONG_ADMIN_GUI_LISTEN
                  value: "0.0.0.0:8002"
                - name: KONG_ADMIN_GUI_URL
                  value: "http://kong.k8s.admin.billingpay.com.br"
                - name: KONG_ADMIN_GUI_API_URL
                  value: "http://kong-admin.k8s.admin.billingpay.com.br"
                - name: KONG_ADMIN_LISTEN
                  value: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
                - name: KONG_STATUS_LISTEN
                  value: "0.0.0.0:8100"
              name: proxy
        metadata:
          labels:
            app.kubernetes.io/name: kong
    network:
      services:
        ingress:
          type: ClusterIP
          name: kong-proxy-static
